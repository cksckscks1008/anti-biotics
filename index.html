<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>세균 퇴치 연구소 - MP3 BGM Edition</title>
  <style>
    @font-face {
      font-family: "PFStardust";
      src: url("https://fastly.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.1/PFStardust.woff") format("woff");
      font-weight: normal; font-style: normal;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; padding: 0; background-color: #010408;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; width: 100vw; font-family: "PFStardust", sans-serif;
      user-select: none; overflow: hidden; line-height: 1;
    }

    #game-container {
      width: 100vw; height: 100vh;
      background: radial-gradient(circle at center, #071a24 0%, #010407 100%);
      position: relative; overflow: hidden;
    }

    #game-container.shake { animation: screenShake 0.15s ease-in-out; }
    @keyframes screenShake {
      0% { transform: translate(0, 0); }
      25% { transform: translate(-8px, 6px); }
      50% { transform: translate(8px, -6px); }
      75% { transform: translate(-6px, -4px); }
      100% { transform: translate(0, 0); }
    }

    #grid-bg {
      position: absolute; width: 100%; height: 100%;
      background-image: 
        linear-gradient(rgba(0, 255, 200, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 200, 0.04) 1px, transparent 1px);
      background-size: 35px 35px; pointer-events: none;
    }

    #scan-line {
      position: absolute; width: 100%; height: 12px;
      background: linear-gradient(180deg, rgba(0, 255, 200, 0.6), transparent);
      top: -12px; left: 0; pointer-events: none; z-index: 1;
      animation: scanMove 3s linear infinite;
    }
    @keyframes scanMove {
      0% { top: -12px; opacity: 0; }
      15% { opacity: 0.9; }
      85% { opacity: 0.9; }
      100% { top: 100vh; opacity: 0; }
    }

    /* 상단 무기 패널 및 사운드 버튼 */
    #top-bar {
      height: 110px; background: rgba(4, 16, 24, 0.94);
      border-bottom: 2px solid rgba(0, 255, 200, 0.4);
      backdrop-filter: blur(12px); display: flex; justify-content: center;
      align-items: center; gap: 15px; padding: 0 20px; z-index: 10; position: relative;
    }

    .weapon {
      position: relative; width: 95px; height: 90px;
      display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
      cursor: pointer; border-radius: 10px; color: white;
      background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 255, 200, 0.2);
      transition: all 0.2s ease; padding-bottom: 8px;
    }
    .weapon:hover {
      background: rgba(0, 255, 200, 0.15); border-color: rgba(0, 255, 200, 0.7);
      transform: translateY(-4px);
    }
    .weapon.active {
      background: rgba(0, 255, 200, 0.25); border: 2px solid #00ffc8;
      box-shadow: 0 0 20px rgba(0, 255, 200, 0.6); transform: scale(1.05);
    }

    .weapon-icon { width: 42px; height: 42px; object-fit: contain; margin-bottom: 4px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.6)); }
    .weapon .num { font-size: 11px; font-weight: bold; color: #00ffc8; position: absolute; top: 6px; left: 8px; }
    .weapon .name { font-size: 11px; color: #e0e0e0; text-align: center; }

    .target-bug {
      position: absolute; top: 6px; right: 6px; width: 20px; height: 20px;
      object-fit: contain; border-radius: 50%; background: rgba(0, 0, 0, 0.5);
      padding: 2px; border: 1px solid rgba(0, 255, 200, 0.3);
    }

    #sound-toggle {
      position: absolute; right: 25px; top: 32px; background: rgba(0, 255, 200, 0.1);
      border: 1px solid #00ffc8; color: #00ffc8; padding: 10px 14px; border-radius: 8px;
      cursor: pointer; font-family: inherit; font-size: 12px; transition: all 0.2s;
    }
    #sound-toggle:hover { background: rgba(0, 255, 200, 0.3); }

    /* 대시보드 */
    #status-area { position: relative; padding: 12px 30px 5px 30px; color: white; z-index: 5; }
    .progress-track {
      width: 50%; margin: 0 auto; height: 10px; background-color: rgba(255, 255, 255, 0.08);
      border-radius: 5px; overflow: hidden; border: 1px solid rgba(0, 255, 200, 0.3);
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
    }
    .progress-fill {
      height: 100%; background: linear-gradient(90deg, #00ffc8, #00b8ff);
      width: 0%; transition: width 1s linear; box-shadow: 0 0 12px #00ffc8;
    }

    .stats-row {
      display: flex; justify-content: space-between; align-items: center;
      max-width: 1050px; margin: 10px auto 0 auto;
    }
    .stat-card {
      background: rgba(2, 10, 16, 0.75); border: 1px solid rgba(0, 255, 200, 0.3);
      padding: 8px 14px; border-radius: 8px; text-align: center; min-width: 120px;
      backdrop-filter: blur(4px);
    }
    .stat-card .label { font-size: 10px; color: #8ab4f8; display: block; margin-bottom: 4px; }
    .stat-card .value { font-size: 17px; font-weight: bold; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.4); }

    .heat-bar-track { width: 100%; height: 4px; background: rgba(255,255,255,0.1); margin-top: 4px; border-radius: 2px; overflow: hidden; }
    .heat-bar-fill { height: 100%; width: 0%; background: #ff5500; transition: width 0.1s; }

    #fever-btn {
      background: linear-gradient(135deg, #ff0055, #ff5500); border: none; color: white;
      padding: 10px 18px; font-size: 12px; font-weight: bold; border-radius: 8px;
      cursor: pointer; box-shadow: 0 0 15px rgba(255, 0, 85, 0.4); transition: all 0.2s;
      opacity: 0.4; pointer-events: none;
    }
    #fever-btn.ready { opacity: 1; pointer-events: auto; animation: pulse 1s infinite alternate; }
    @keyframes pulse {
      from { transform: scale(1); box-shadow: 0 0 15px rgba(255, 0, 85, 0.6); }
      to { transform: scale(1.06); box-shadow: 0 0 25px rgba(255, 0, 85, 1); }
    }

    #toast-container {
      position: absolute; top: 125px; right: 25px; z-index: 100;
      display: flex; flex-direction: column; gap: 8px; pointer-events: none;
    }
    .toast {
      background: rgba(2, 10, 16, 0.9); border: 1px solid #00ffc8; color: #00ffc8;
      padding: 8px 14px; border-radius: 6px; font-size: 12px;
      box-shadow: 0 0 10px rgba(0, 255, 200, 0.3); animation: toastIn 0.3s forwards;
    }
    @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }

    #boss-bar-container {
      position: absolute; top: 185px; left: 50%; transform: translateX(-50%);
      width: 420px; background: rgba(0, 0, 0, 0.85); border: 2px solid #ff0055;
      border-radius: 8px; padding: 6px 12px; display: none; z-index: 50; text-align: center;
    }
    #boss-bar-container .title { font-size: 12px; color: #ff0055; margin-bottom: 4px; font-weight: bold; }
    .boss-hp-track { width: 100%; height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
    .boss-hp-fill { height: 100%; width: 100%; background: linear-gradient(90deg, #ff0055, #ff5500); transition: width 0.1s; }

    #mini-radar {
      position: absolute; bottom: 20px; right: 20px; width: 100px; height: 100px;
      border-radius: 50%; background: rgba(4, 16, 24, 0.85); border: 2px solid rgba(0, 255, 200, 0.5);
      z-index: 50; overflow: hidden; pointer-events: none; box-shadow: 0 0 15px rgba(0,0,0,0.8);
    }
    .radar-dot { position: absolute; width: 4px; height: 4px; background: #ff0055; border-radius: 50%; transform: translate(-50%, -50%); }

    #play-area {
      position: absolute; top: 180px; left: 0; width: 100%;
      height: calc(100vh - 180px); overflow: hidden; cursor: none;
    }

    .bacteria-wrapper {
      position: absolute; width: 80px; height: 80px;
      transform-origin: center; cursor: none;
      animation: spawnAnim 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes spawnAnim { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    .bacteria-wrapper.frozen { filter: drop-shadow(0 0 12px #00b8ff) hue-rotate(180deg) !important; }
    .bacteria-wrapper.burning { filter: drop-shadow(0 0 15px #ff5500) hue-rotate(-30deg) !important; }

    .bacteria-img {
      width: 100%; height: 100%; object-fit: contain; pointer-events: none;
      animation: squishBlob 2.5s ease-in-out infinite alternate;
    }
    @keyframes squishBlob {
      0% { transform: scale(1, 1); }
      50% { transform: scale(1.08, 0.92); }
      100% { transform: scale(0.93, 1.07); }
    }

    .hp-bar-bg {
      position: absolute; top: -8px; left: 10px; width: 60px; height: 5px;
      background: rgba(0,0,0,0.7); border-radius: 3px; border: 1px solid rgba(255,255,255,0.2);
      overflow: hidden; pointer-events: none;
    }
    .hp-bar-fill { height: 100%; background: linear-gradient(90deg, #ff3366, #ff6600); width: 100%; }

    #custom-cursor {
      position: absolute; width: 52px; height: 52px; object-fit: contain;
      pointer-events: none; z-index: 999; display: none; transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 10px rgba(0, 255, 200, 0.8));
    }
    #custom-cursor.swing { transform: translate(-50%, -50%) scale(0.75) rotate(-25deg); }

    .cursor-trail {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 900;
      background: #00ffc8; opacity: 0.6; animation: trailFade 0.3s forwards;
    }
    @keyframes trailFade { to { opacity: 0; transform: scale(0); } }

    .damage-text {
      position: absolute; font-weight: bold; font-size: 20px; pointer-events: none; z-index: 100;
      animation: floatUp 0.6s ease-out forwards; text-shadow: 0 0 6px #000, 2px 2px 0 #000;
    }
    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      50% { transform: translateY(-25px) scale(1.2); }
      100% { opacity: 0; transform: translateY(-45px) scale(0.8); }
    }

    .shockwave {
      position: absolute; border-radius: 50%; border: 3px solid #00ffc8;
      pointer-events: none; z-index: 85; transform: translate(-50%, -50%);
      animation: shockwaveExpand 0.4s ease-out forwards;
    }
    @keyframes shockwaveExpand {
      0% { width: 0px; height: 0px; opacity: 1; }
      100% { width: 160px; height: 160px; opacity: 0; border-width: 1px; }
    }

    .particle {
      position: absolute; border-radius: 50%; pointer-events: none; z-index: 90;
      animation: popParticle 0.5s ease-out forwards;
    }
    @keyframes popParticle {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    #danger-overlay {
      position: absolute; top:0; left:0; width:100%; height:100%;
      box-shadow: inset 0 0 70px rgba(255, 0, 85, 0.7); pointer-events: none; z-index: 2; opacity: 0;
    }
    #danger-overlay.active { animation: dangerBlink 0.8s infinite alternate; }
    @keyframes dangerBlink { from { opacity: 0.2; } to { opacity: 0.8; } }

    #visual-eq {
      position: absolute; bottom: 0; left: 0; width: 100%; height: 25px;
      display: flex; justify-content: space-between; align-items: flex-end;
      padding: 0 20px; pointer-events: none; opacity: 0.4;
    }
    .eq-bar { width: 6px; background: #00ffc8; border-radius: 3px 3px 0 0; transition: height 0.1s; }

    #modal {
      display: flex; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(2, 8, 14, 0.94); color: white; flex-direction: column;
      justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(12px);
    }
    #modal h1 { font-size: 46px; margin-bottom: 8px; color: #00ffc8; text-shadow: 0 0 20px #00ffc8; }
    #modal p { font-size: 15px; color: #8ab4f8; margin-bottom: 20px; }

    .report-box {
      background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0, 255, 200, 0.3);
      border-radius: 10px; padding: 20px 30px; margin-bottom: 20px; display: flex; gap: 30px; text-align: center;
    }
    .report-item .num { font-size: 22px; color: #fff; font-weight: bold; margin-top: 5px; }
    .report-item .lbl { font-size: 11px; color: #8ab4f8; }

    #rank-stamp {
      font-size: 32px; font-weight: bold; color: #ff0055; border: 4px solid #ff0055;
      padding: 6px 18px; border-radius: 8px; transform: rotate(-10deg) scale(0);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-bottom: 20px;
    }
    #rank-stamp.show { transform: rotate(-10deg) scale(1); }

    #retry-btn {
      padding: 15px 42px; font-size: 18px; font-weight: bold; cursor: pointer;
      background: linear-gradient(135deg, #00ffc8, #00b8ff); border: none;
      border-radius: 8px; color: #020a10; box-shadow: 0 0 20px rgba(0, 255, 200, 0.5); transition: all 0.2s;
    }
    #retry-btn:hover { transform: scale(1.06); box-shadow: 0 0 30px rgba(0, 255, 200, 0.8); }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="grid-bg"></div>
    <div id="scan-line"></div>
    <div id="danger-overlay"></div>
    <div id="toast-container"></div>

    <div id="top-bar">
      <div class="weapon active" id="w1" onclick="selectWeapon(1)">
        <img class="target-bug" src="assets/포도상구균.svg" alt="target" />
        <img class="weapon-icon" src="assets/알코올 스프레이.svg" alt="weapon" />
        <span class="num">1</span><span class="name">격렬 스프레이</span>
      </div>
      <div class="weapon" id="w2" onclick="selectWeapon(2)">
        <img class="target-bug" src="assets/대장균.svg" alt="target" />
        <img class="weapon-icon" src="assets/UV 라이트.svg" alt="weapon" />
        <span class="num">2</span><span class="name">밝고 위험한 빛</span>
      </div>
      <div class="weapon" id="w3" onclick="selectWeapon(3)">
        <img class="target-bug" src="assets/녹농균.svg" alt="target" />
        <img class="weapon-icon" src="assets/항생제 캡슐.svg" alt="weapon" />
        <span class="num">3</span><span class="name">모든 세균의 악몽</span>
      </div>
      <div class="weapon" id="w4" onclick="selectWeapon(4)">
        <img class="target-bug" src="assets/서모코쿠스.svg" alt="target" />
        <img class="weapon-icon" src="assets/냉각 가스.svg" alt="weapon" />
        <span class="num">4</span><span class="name">엔트로피 저하</span>
      </div>
      <div class="weapon" id="w5" onclick="selectWeapon(5)">
        <img class="target-bug" src="assets/바실리스 포자균.svg" alt="target" />
        <img class="weapon-icon" src="assets/레이저 포인트.svg" alt="weapon" />
        <span class="num">5</span><span class="name">열 집합</span>
      </div>

      <button id="sound-toggle" onclick="toggleAudio()">🎵 SOUND ON</button>
    </div>

    <div id="status-area">
      <div class="progress-track"><div class="progress-fill" id="progress-bar"></div></div>
      
      <div class="stats-row">
        <div class="stat-card">
          <span class="label">남은 시간</span>
          <span class="value" id="timer-text">02:00</span>
        </div>
        <div class="stat-card">
          <span class="label">획득 DNA</span>
          <span class="value" id="dna-text">0</span>
        </div>
        <div class="stat-card">
          <span class="label">연속 콤보</span>
          <span class="value" id="combo-text" style="color:#ffcc00">0 COMBO</span>
        </div>
        <div class="stat-card">
          <span class="label">무기 과열</span>
          <div class="heat-bar-track"><div class="heat-bar-fill" id="heat-fill"></div></div>
        </div>
        <div class="stat-card">
          <span class="label">세균 밀도</span>
          <span class="value" id="bac-count-text">0 / 20</span>
        </div>
        <button id="fever-btn" onclick="triggerFever()">전체 소독 [SPACE]</button>
      </div>
    </div>

    <div id="boss-bar-container">
      <div class="title">⚠️ 변종 바이러스 보스 출현! ⚠️</div>
      <div class="boss-hp-track"><div class="boss-hp-fill" id="boss-hp-fill"></div></div>
    </div>

    <div id="mini-radar"></div>

    <div id="play-area">
      <img id="custom-cursor" src="assets/알코올 스프레이.svg" alt="cursor" />
    </div>

    <div id="visual-eq"></div>

    <div id="modal">
      <h1 id="modal-title">세균 퇴치 연구소</h1>
      <p id="modal-desc">상성에 맞는 최적의 무기로 바이러스의 확산을 차단하세요!</p>
      
      <div class="report-box" id="report-box" style="display:none;">
        <div class="report-item"><div class="lbl">최종 DNA</div><div class="num" id="rep-dna">0</div></div>
        <div class="report-item"><div class="lbl">최고 콤보</div><div class="num" id="rep-combo">0</div></div>
        <div class="report-item"><div class="lbl">퇴치 수</div><div class="num" id="rep-kills">0</div></div>
      </div>

      <div id="rank-stamp">S+ CLASS</div>

      <button id="retry-btn">작전 개시</button>
    </div>
  </div>

  <script>
    /* ================= Audio Engine ================= */
    let audioCtx = null;
    let isAudioMuted = false;

    // 실제 에셋 폴더의 MP3 파일을 BGM으로 사용한다.
    const bgmAudio = new Audio("assets/bgm.mp3");
    bgmAudio.loop = true;
    bgmAudio.preload = "auto";
    bgmAudio.volume = 0.55;

    bgmAudio.addEventListener("error", () => {
      console.error("BGM 파일을 불러오지 못했습니다: assets/bgm.mp3");
    });

    // 효과음용 Web Audio API 초기화
    async function initAudio() {
      if (!audioCtx) {
        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
        if (!AudioContextClass) {
          console.warn("이 브라우저는 Web Audio API를 지원하지 않습니다.");
          return false;
        }
        audioCtx = new AudioContextClass();
      }

      if (audioCtx.state === "suspended") {
        try {
          await audioCtx.resume();
        } catch (error) {
          console.error("AudioContext resume failed:", error);
          return false;
        }
      }

      return audioCtx.state === "running";
    }

    async function toggleAudio() {
      void initAudio();
      isAudioMuted = !isAudioMuted;
      bgmAudio.muted = isAudioMuted;

      document.getElementById("sound-toggle").innerText =
        isAudioMuted ? "🔇 SOUND OFF" : "🎵 SOUND ON";

      if (!isAudioMuted && !isGameOver && !isPaused) {
        await startBGM(false);
      }
    }

    // Synth SFX 효과음 재생 함수
    function playSFX(type) {
      if (isAudioMuted || !audioCtx) return;
      
      const now = audioCtx.currentTime;

      if (type === "spray") {
        const bufferSize = audioCtx.sampleRate * 0.1;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
        
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        noise.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
      } else if (type === "uv") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sawtooth";
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.15);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.15);
      } else if (type === "capsule") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "triangle";
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(40, now + 0.2);
        gain.gain.setValueAtTime(0.4, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.2);
      } else if (type === "laser") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(1200, now);
        osc.frequency.linearRampToValueAtTime(800, now + 0.08);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.08);
      } else if (type === "pop") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "sine";
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.1);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.1);
      } else if (type === "boom") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(100, now);
        osc.frequency.exponentialRampToValueAtTime(20, now + 0.4);
        gain.gain.setValueAtTime(0.5, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(now + 0.4);
      }
    }

    // assets/bgm.mp3 재생
    async function startBGM(restart = true) {
      if (restart) bgmAudio.currentTime = 0;
      if (isAudioMuted || isGameOver || isPaused) return;

      try {
        await bgmAudio.play();
      } catch (error) {
        console.error("BGM 재생 실패:", error);
        showToast("🎵 BGM을 재생할 수 없습니다. assets/bgm.mp3 경로를 확인하세요.");
      }
    }

    function pauseBGM() {
      bgmAudio.pause();
    }

    function stopBGM() {
      bgmAudio.pause();
      bgmAudio.currentTime = 0;
    }

    /* ================= Core Game Logic ================= */
    const TOTAL_TIME = 120;
    const MAX_BACTERIA = 20;

    const BACTERIA_TYPES = [
      { id: 1, file: "포도상구균.svg", hp: 12, speed: 40, behavior: "tank" },
      { id: 2, file: "대장균.svg", hp: 8, speed: 120, behavior: "zigzag" },
      { id: 3, file: "녹농균.svg", hp: 10, speed: 70, behavior: "wave" },
      { id: 4, file: "서모코쿠스.svg", hp: 15, speed: 50, behavior: "normal" },
      { id: 5, file: "바실리스 포자균.svg", hp: 6, speed: 150, behavior: "fast" }
    ];

    const WEAPON_FILES = {
      1: "알코올 스프레이.svg", 2: "UV 라이트.svg",
      3: "항생제 캡슐.svg", 4: "냉각 가스.svg", 5: "레이저 포인트.svg"
    };

    let currentWeapon = 1;
    let timeElapsed = 0;
    let dnaScore = 0;
    let combo = 0;
    let maxCombo = 0;
    let totalKills = 0;
    let feverGauge = 0;
    let heatLevel = 0;
    let isOverheated = false;
    let bacteriaList = [];
    let bossObj = null;
    let isGameOver = true;
    let isPaused = false;
    let lastTime = 0;
    let gameTimer, spawnTimer, animationFrameId;

    const gameContainer = document.getElementById("game-container");
    const playArea = document.getElementById("play-area");
    const customCursor = document.getElementById("custom-cursor");
    const heatFill = document.getElementById("heat-fill");
    const toastContainer = document.getElementById("toast-container");
    const bossBarContainer = document.getElementById("boss-bar-container");
    const bossHpFill = document.getElementById("boss-hp-fill");
    const rankStamp = document.getElementById("rank-stamp");
    const visualEq = document.getElementById("visual-eq");
    const miniRadar = document.getElementById("mini-radar");

    for (let i = 0; i < 45; i++) {
      const bar = document.createElement("div");
      bar.className = "eq-bar";
      bar.style.height = "5px";
      visualEq.appendChild(bar);
    }

    playArea.addEventListener("mousemove", (e) => {
      const rect = playArea.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      customCursor.style.left = `${x}px`;
      customCursor.style.top = `${y}px`;
      customCursor.style.display = "block";

      if (Math.random() > 0.3) {
        const trail = document.createElement("div");
        trail.className = "cursor-trail";
        trail.style.left = `${x - 4}px`; trail.style.top = `${y - 4}px`;
        trail.style.width = "8px"; trail.style.height = "8px";
        playArea.appendChild(trail);
        setTimeout(() => trail.remove(), 300);
      }
    });

    playArea.addEventListener("mouseleave", () => customCursor.style.display = "none");
    
    playArea.addEventListener("mousedown", () => {
      void initAudio();
      if (isOverheated) {
        showToast("⚠️ 무기 과열 상태! 잠시 대기하세요!");
        return;
      }
      customCursor.classList.add("swing");
      setTimeout(() => customCursor.classList.remove("swing"), 80);

      // 무기 사운드 트리거
      if (currentWeapon === 1) playSFX("spray");
      else if (currentWeapon === 2) playSFX("uv");
      else if (currentWeapon === 3) playSFX("capsule");
      else if (currentWeapon === 4) playSFX("spray");
      else if (currentWeapon === 5) playSFX("laser");

      heatLevel = Math.min(100, heatLevel + 7);
      if (heatLevel >= 100) {
        isOverheated = true;
        showToast("🔥 무기 과열 발생! 잠시 공격 불가!");
      }
    });

    window.addEventListener("keydown", (e) => {
      void initAudio();
      if (e.key >= "1" && e.key <= "5") selectWeapon(parseInt(e.key));
      if (e.code === "Space" && feverGauge >= 100) triggerFever();
      if (e.code === "Escape" && !isGameOver) togglePause();
      if (e.code === "KeyR" && isGameOver) startGame();
    });

    function showToast(msg) {
      const t = document.createElement("div");
      t.className = "toast"; t.innerText = msg;
      toastContainer.appendChild(t);
      setTimeout(() => t.remove(), 2200);
    }

    function selectWeapon(num) {
      if (isGameOver || isPaused) return;
      currentWeapon = num;
      document.querySelectorAll(".weapon").forEach((w, i) => {
        w.classList.toggle("active", i + 1 === num);
      });
      customCursor.src = `assets/${WEAPON_FILES[num]}`;
      highlightTargetBacteria();
    }

    function highlightTargetBacteria() {
      bacteriaList.forEach(b => {
        if (b.type === currentWeapon) {
          b.el.style.filter = "drop-shadow(0 0 12px #00ffc8) scale(1.1)";
        } else if (!b.isFrozen && !b.isBurning) {
          b.el.style.filter = "none";
        }
      });
    }

    function spawnBacteria() {
      if (isGameOver || isPaused) return;

      if (timeElapsed > 0 && timeElapsed % 30 === 0 && !bossObj) {
        spawnBoss();
      }

      const maxTypeIndex = Math.min(5, Math.floor(timeElapsed / 20) + 1);
      const bType = BACTERIA_TYPES[Math.floor(Math.random() * maxTypeIndex)];

      const wrapper = document.createElement("div");
      wrapper.className = "bacteria-wrapper";

      const img = document.createElement("img");
      img.className = "bacteria-img";
      img.src = `assets/${bType.file}`;

      const hpBg = document.createElement("div");
      hpBg.className = "hp-bar-bg";
      const hpFill = document.createElement("div");
      hpFill.className = "hp-bar-fill";
      hpBg.appendChild(hpFill);

      wrapper.appendChild(hpBg);
      wrapper.appendChild(img);

      const x = Math.random() * (playArea.clientWidth - 90);
      const y = Math.random() * (playArea.clientHeight - 90);
      const angle = Math.random() * Math.PI * 2;

      wrapper.style.left = `${x}px`; wrapper.style.top = `${y}px`;

      const bObj = {
        id: Date.now() + Math.random(), el: wrapper, hpFill: hpFill,
        type: bType.id, hp: bType.hp, maxHp: bType.hp,
        speed: bType.speed, behavior: bType.behavior,
        x: x, y: y, vx: Math.cos(angle) * bType.speed, vy: Math.sin(angle) * bType.speed,
        timeAcc: 0, isFrozen: false, isBurning: false, burnTimer: 0, burnTickAcc: 0
      };

      wrapper.addEventListener("mousedown", (e) => {
        e.preventDefault();
        hitBacteria(bObj, e.clientX, e.clientY);
      });

      bacteriaList.push(bObj);
      playArea.appendChild(wrapper);
      highlightTargetBacteria();
      updateUI();

      if (bacteriaList.length >= MAX_BACTERIA) endGame(false);
    }

    function spawnBoss() {
      showToast("🚨 WARN: 변종 바이러스 보스 출현!");
      bossBarContainer.style.display = "block";

      const wrapper = document.createElement("div");
      wrapper.className = "bacteria-wrapper";
      wrapper.style.width = "140px"; wrapper.style.height = "140px";

      const img = document.createElement("img");
      img.className = "bacteria-img";
      img.src = `assets/서모코쿠스.svg`;
      img.style.filter = "hue-rotate(300deg) drop-shadow(0 0 15px #ff0055)";

      wrapper.appendChild(img);

      const x = playArea.clientWidth / 2 - 70;
      const y = playArea.clientHeight / 2 - 70;

      wrapper.style.left = `${x}px`; wrapper.style.top = `${y}px`;

      bossObj = {
        el: wrapper, hp: 120, maxHp: 120,
        x: x, y: y, vx: 70, vy: 70
      };

      wrapper.addEventListener("mousedown", (e) => {
        e.preventDefault();
        hitBoss(e.clientX, e.clientY);
      });

      playArea.appendChild(wrapper);
    }

    function hitBoss(clientX, clientY) {
      if (isGameOver || isOverheated || isPaused) return;
      bossObj.hp -= 5;
      bossHpFill.style.width = `${(bossObj.hp / bossObj.maxHp) * 100}%`;

      showDamageText(clientX, clientY, `-5`, "#ff0055");
      createParticles(clientX, clientY, "#ff0055", 10);
      playSFX("pop");

      if (bossObj.hp <= 0) {
        triggerDeathExplosion(bossObj.x + 70, bossObj.y + 70, "#ff0055", true);
        showToast("🎉 변종 보스 격퇴 완료! +250 DNA");
        dnaScore += 250;
        bossObj.el.remove();
        bossObj = null;
        bossBarContainer.style.display = "none";
      }
    }

    function hitBacteria(bObj, clientX, clientY) {
      if (isGameOver || isOverheated || isPaused) return;

      const isCritical = (currentWeapon === bObj.type);
      const damage = isCritical ? 10 : 2;
      bObj.hp -= damage;

      playSFX("pop");

      if (currentWeapon === 4 && !bObj.isFrozen) {
        bObj.isFrozen = true;
        bObj.speed = 0; bObj.vx = 0; bObj.vy = 0;
        bObj.el.classList.add("frozen");
      }

      if (currentWeapon === 5) {
        bObj.isBurning = true;
        bObj.burnTimer = 3.0;
        bObj.el.classList.add("burning");
      }

      combo++;
      if (combo > maxCombo) maxCombo = combo;
      feverGauge = Math.min(100, feverGauge + (isCritical ? 15 : 5));

      if (combo === 10) showToast("🔥 10 COMBO! DNA 가산점!");

      showDamageText(clientX, clientY, isCritical ? `-10 CRITICAL!` : `-2`, isCritical ? "#ffcc00" : "#ffffff");
      createParticles(clientX, clientY, isCritical ? "#00ffc8" : "#ff3366", isCritical ? 12 : 5);

      bObj.hpFill.style.width = `${Math.max(0, (bObj.hp / bObj.maxHp) * 100)}%`;

      if (bObj.hp <= 0) {
        killBacteria(bObj, clientX, clientY);
      }

      updateUI();
    }

    function killBacteria(bObj, clientX, clientY) {
      totalKills++;
      playSFX("boom");

      const rect = playArea.getBoundingClientRect();
      const px = clientX ? (clientX - rect.left) : (bObj.x + 40);
      const py = clientY ? (clientY - rect.top) : (bObj.y + 40);

      triggerDeathExplosion(px, py, bObj.type === currentWeapon ? "#00ffc8" : "#ff3366", false);

      bObj.el.remove();
      bacteriaList = bacteriaList.filter((b) => b.id !== bObj.id);
      
      const earnedDna = 15 + Math.floor(combo / 5) * 5;
      dnaScore += earnedDna;
    }

    function triggerDeathExplosion(px, py, color, isBoss) {
      const shockwave = document.createElement("div");
      shockwave.className = "shockwave";
      shockwave.style.left = `${px}px`; shockwave.style.top = `${py}px`;
      shockwave.style.borderColor = color;
      playArea.appendChild(shockwave);
      setTimeout(() => shockwave.remove(), 400);

      const particleCount = isBoss ? 45 : 25;
      for (let i = 0; i < particleCount; i++) {
        const p = document.createElement("div");
        p.className = "particle";
        p.style.backgroundColor = i % 2 === 0 ? color : "#ffffff";
        p.style.left = `${px}px`; p.style.top = `${py}px`;
        p.style.width = `${Math.random() * 10 + 4}px`; p.style.height = p.style.width;

        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * (isBoss ? 140 : 80) + 30;
        p.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
        p.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);

        playArea.appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    }

    function createParticles(x, y, color, count) {
      const rect = playArea.getBoundingClientRect();
      const px = x - rect.left; const py = y - rect.top;

      for (let i = 0; i < count; i++) {
        const p = document.createElement("div");
        p.className = "particle"; p.style.backgroundColor = color;
        p.style.left = `${px}px`; p.style.top = `${py}px`;
        p.style.width = `${Math.random() * 8 + 4}px`; p.style.height = p.style.width;

        const angle = Math.random() * Math.PI * 2;
        const dist = Math.random() * 60 + 20;
        p.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
        p.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);

        playArea.appendChild(p);
        setTimeout(() => p.remove(), 500);
      }
    }

    function showDamageText(x, y, text, color) {
      const rect = playArea.getBoundingClientRect();
      const dt = document.createElement("div");
      dt.className = "damage-text"; dt.innerText = text; dt.style.color = color;
      dt.style.left = `${x - rect.left}px`; dt.style.top = `${y - rect.top}px`;
      playArea.appendChild(dt);
      setTimeout(() => dt.remove(), 600);
    }

    function triggerFever() {
      if (feverGauge < 100 || isGameOver || isPaused) return;
      feverGauge = 0;
      playSFX("boom");
      gameContainer.classList.add("shake");
      setTimeout(() => gameContainer.classList.remove("shake"), 200);

      bacteriaList.forEach((bObj) => {
        bObj.hp -= 20;
        if (bObj.hp <= 0) killBacteria(bObj, null, null);
      });

      dnaScore += 150;
      showToast("💥 전체 소독 충격파 발동!");
      updateUI();
    }

    function togglePause() {
      isPaused = !isPaused;
      if (isPaused) {
        pauseBGM();
        document.getElementById("modal-title").innerText = "연구 일시정지";
        document.getElementById("modal-title").style.color = "#8ab4f8";
        document.getElementById("modal-desc").innerText = "ESC를 눌러 연구를 재개할 수 있습니다.";
        document.getElementById("report-box").style.display = "none";
        rankStamp.classList.remove("show");
        document.getElementById("retry-btn").innerText = "연구 재개";
        document.getElementById("modal").style.display = "flex";
      } else {
        document.getElementById("modal").style.display = "none";
        void startBGM(false);
      }
    }

    function updateRadar() {
      miniRadar.innerHTML = "";
      const rw = playArea.clientWidth; const rh = playArea.clientHeight;
      bacteriaList.forEach(b => {
        const dot = document.createElement("div");
        dot.className = "radar-dot";
        dot.style.left = `${(b.x / rw) * 100}%`;
        dot.style.top = `${(b.y / rh) * 100}%`;
        miniRadar.appendChild(dot);
      });
    }

    function gameLoop(timestamp) {
      if (!lastTime) lastTime = timestamp;
      const dt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      if (!isGameOver && !isPaused) {
        if (heatLevel > 0) {
          heatLevel = Math.max(0, heatLevel - dt * 30);
          if (heatLevel === 0) isOverheated = false;
        }
        heatFill.style.width = `${heatLevel}%`;

        document.querySelectorAll(".eq-bar").forEach(bar => {
          bar.style.height = `${Math.random() * 20 + 3}px`;
        });

        const w = playArea.clientWidth - 80;
        const h = playArea.clientHeight - 80;

        bacteriaList.forEach((b) => {
          if (b.isBurning) {
            b.burnTimer -= dt;
            b.burnTickAcc += dt;
            if (b.burnTickAcc >= 0.5) {
              b.burnTickAcc = 0;
              b.hp -= 1;
              b.hpFill.style.width = `${Math.max(0, (b.hp / b.maxHp) * 100)}%`;

              const rect = playArea.getBoundingClientRect();
              createParticles(rect.left + b.x + 40, rect.top + b.y + 40, "#ff5500", 3);

              if (b.hp <= 0) {
                killBacteria(b, null, null);
                return;
              }
            }

            if (b.burnTimer <= 0) {
              b.isBurning = false;
              b.el.classList.remove("burning");
            }
          }

          if (!b.isFrozen) {
            b.timeAcc += dt;
            if (b.behavior === "zigzag") b.vx += Math.sin(b.timeAcc * 5) * 20;
            b.x += b.vx * dt; b.y += b.vy * dt;

            if (b.x <= 0 || b.x >= w) b.vx *= -1;
            if (b.y <= 0 || b.y >= h) b.vy *= -1;
          }

          b.el.style.left = `${b.x}px`; b.el.style.top = `${b.y}px`;
        });

        if (bossObj) {
          bossObj.x += bossObj.vx * dt; bossObj.y += bossObj.vy * dt;
          if (bossObj.x <= 0 || bossObj.x >= playArea.clientWidth - 140) bossObj.vx *= -1;
          if (bossObj.y <= 0 || bossObj.y >= playArea.clientHeight - 140) bossObj.vy *= -1;
          bossObj.el.style.left = `${bossObj.x}px`; bossObj.el.style.top = `${bossObj.y}px`;
        }

        updateRadar();
      }
      animationFrameId = requestAnimationFrame(gameLoop);
    }

    function updateUI() {
      document.getElementById("dna-text").innerText = dnaScore;
      document.getElementById("combo-text").innerText = `${combo} COMBO`;
      document.getElementById("bac-count-text").innerText = `${bacteriaList.length} / ${MAX_BACTERIA}`;

      document.getElementById("danger-overlay").classList.toggle("active", bacteriaList.length >= 15);

      const feverBtn = document.getElementById("fever-btn");
      if (feverGauge >= 100) {
        feverBtn.classList.add("ready"); feverBtn.innerText = "전체 소독 [READY]";
      } else {
        feverBtn.classList.remove("ready"); feverBtn.innerText = `소독 충전 중 (${Math.floor(feverGauge)}%)`;
      }
    }

    function tickTimer() {
      if (isPaused) return;
      timeElapsed++;
      const timeLeft = TOTAL_TIME - timeElapsed;
      const m = Math.floor(timeLeft / 60); const s = timeLeft % 60;
      document.getElementById("timer-text").innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
      document.getElementById("progress-bar").style.width = `${(timeElapsed / TOTAL_TIME) * 100}%`;

      if (timeLeft <= 0) endGame(true);
    }

    function endGame(isWin) {
      isGameOver = true;
      stopBGM();
      clearInterval(gameTimer); clearInterval(spawnTimer);
      cancelAnimationFrame(animationFrameId);

      document.getElementById("modal-title").innerText = isWin ? "작전 완수!" : "연구소 오염됨";
      document.getElementById("modal-title").style.color = isWin ? "#00ffc8" : "#ff0055";

      document.getElementById("rep-dna").innerText = dnaScore;
      document.getElementById("rep-combo").innerText = maxCombo;
      document.getElementById("rep-kills").innerText = totalKills;
      document.getElementById("report-box").style.display = "flex";

      let rank = "C CLASS";
      if (dnaScore > 800) rank = "S+ CLASS";
      else if (dnaScore > 500) rank = "A CLASS";
      else if (dnaScore > 300) rank = "B CLASS";

      rankStamp.innerText = rank;
      rankStamp.classList.add("show");

      document.getElementById("retry-btn").innerText = "다시 도전 [R]";
      document.getElementById("modal").style.display = "flex";
    }

    function startGame() {
      // 클릭 이벤트 안에서 바로 호출해야 브라우저 자동재생 제한에 막히지 않는다.
      void initAudio();

      if (isPaused) {
        togglePause();
        return;
      }

      isGameOver = false; isPaused = false;
      timeElapsed = 0; dnaScore = 0; combo = 0; maxCombo = 0; totalKills = 0;
      feverGauge = 0; heatLevel = 0; isOverheated = false; lastTime = 0;

      document.querySelectorAll(".bacteria-wrapper").forEach(el => el.remove());
      bacteriaList = []; bossObj = null;
      bossBarContainer.style.display = "none";
      rankStamp.classList.remove("show");

      selectWeapon(1);
      document.getElementById("modal").style.display = "none";
      updateUI();

      clearInterval(gameTimer); clearInterval(spawnTimer);
      cancelAnimationFrame(animationFrameId);

      // 프로젝트 구조가 index.html / assets/bgm.mp3이면 바로 재생된다.
      void startBGM(true);

      gameTimer = setInterval(tickTimer, 1000);
      spawnTimer = setInterval(spawnBacteria, 1000);
      animationFrameId = requestAnimationFrame(gameLoop);
    }

    document.getElementById("retry-btn").addEventListener("click", startGame);
  </script>
</body>
</html>
